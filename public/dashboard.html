<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Dashboard | Nithyashree R S</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container {
            max-width: var(--max-width);
            margin: 100px auto;
            padding: 0 20px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .dashboard-title h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .dashboard-title p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .table-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: var(--bg-soft);
            padding: 16px 20px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 18px 20px;
            font-size: 14px;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--bg-service);
        }

        .timestamp {
            color: var(--text-muted);
            font-size: 12px;
            white-space: nowrap;
        }

        .email-link {
            color: var(--accent-gold);
            font-weight: 500;
        }

        .no-data {
            padding: 60px;
            text-align: center;
            color: var(--text-secondary);
        }

        .loading-spinner {
            padding: 60px;
            text-align: center;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Nav specific overrides */
        .dash-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: rgba(247, 246, 243, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            align-items: center;
        }

        body.dark-mode .dash-nav {
            background: rgba(18, 18, 18, 0.8);
        }

        .dash-nav-inner {
            width: 100%;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <nav class="dash-nav">
        <div class="dash-nav-inner">
            <a href="index.html" class="nav-text-link" style="display: flex; align-items: center; gap: 8px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Portfolio
            </a>
            <button id="theme-toggle" class="nav-icon-btn" aria-label="Toggle Theme">
                <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="dashboard-title">
                <h1>Messages Inbox</h1>
                <p>Viewing all inquiries from your portfolio contact form.</p>
            </div>
            <button id="refresh-btn" class="btn btn-outline btn-sm">Refresh Data</button>
        </div>

        <div class="table-wrap">
            <div id="loading" class="loading-spinner">Fetching messages...</div>
            <table id="messages-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Sender</th>
                        <th>Subject</th>
                        <th>Message</th>
                    </tr>
                </thead>
                <tbody id="messages-body">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
            <div id="no-messages" class="no-data" style="display: none;">
                No messages found in the database.
            </div>
        </div>
    </div>

    <script>
        // ─── THEME TOGGLE LOGIC ───
        const themeToggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.querySelector('.sun-icon');
        const moonIcon = document.querySelector('.moon-icon');

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'block';
        }

        themeToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            sunIcon.style.display = isDark ? 'none' : 'block';
            moonIcon.style.display = isDark ? 'block' : 'none';
        });

        // ─── FETCH MESSAGES LOGIC ───
        const messagesTable = document.getElementById('messages-table');
        const messagesBody = document.getElementById('messages-body');
        const loadingEl = document.getElementById('loading');
        const noMessagesEl = document.getElementById('no-messages');
        const refreshBtn = document.getElementById('refresh-btn');

        async function fetchMessages() {
            loadingEl.style.display = 'block';
            messagesTable.style.display = 'none';
            noMessagesEl.style.display = 'none';

            try {
                const response = await fetch('/api/messages');
                const data = await response.json();

                loadingEl.style.display = 'none';

                if (data && data.length > 0) {
                    messagesBody.innerHTML = '';
                    data.forEach(msg => {
                        const date = new Date(msg.submittedAt).toLocaleString('en-IN', {
                            day: 'numeric',
                            month: 'short',
                            year: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        });

                        const row = `
                            <tr>
                                <td><span class="timestamp">${date}</span></td>
                                <td>
                                    <div style="font-weight: 700;">${msg.name}</div>
                                    <a href="mailto:${msg.email}" class="email-link">${msg.email}</a>
                                </td>
                                <td><span style="font-weight: 600;">${msg.subject}</span></td>
                                <td style="max-width: 400px; color: var(--text-secondary); line-height: 1.5;">${msg.message}</td>
                            </tr>
                        `;
                        messagesBody.insertAdjacentHTML('beforeend', row);
                    });
                    messagesTable.style.display = 'table';
                } else {
                    noMessagesEl.style.display = 'block';
                }
            } catch (error) {
                console.error('Error fetching messages:', error);
                loadingEl.innerHTML = '<span style="color: #ef4444;">Failed to load messages. Please ensure the server is running.</span>';
            }
        }

        refreshBtn.addEventListener('click', fetchMessages);
        
        // Initial load
        window.addEventListener('DOMContentLoaded', fetchMessages);
    </script>
</body>
</html>
